<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swarm Robotics Animation</title>
  <style>
    :root {
      --bg1: #08131f;
      --bg2: #0f2234;
      --text: #e8f1ff;
      --muted: #9fb3c8;
      --leader: #ff6b6b;
      --worker: #4ecdc4;
      --scout: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, #16324b 0%, var(--bg1) 45%, #050b12 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: rgba(5, 12, 20, 0.5);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      user-select: none;
      pointer-events: none;
      max-width: min(92vw, 420px);
    }

    .hud h1 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .hud p {
      margin: 4px 0;
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      margin-top: 10px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text);
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      box-shadow: 0 0 10px rgba(255,255,255,0.12);
    }

    .leader { background: var(--leader); }
    .worker { background: var(--worker); }
    .scout { background: var(--scout); }

    .footer-note {
      position: fixed;
      right: 14px;
      bottom: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(5, 12, 20, 0.45);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 640px) {
      .hud h1 {
        font-size: 16px;
      }

      .hud p {
        font-size: 12px;
      }

      .footer-note {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <canvas id="swarmCanvas"></canvas>

  <div class="hud">
    <h1>Swarm Robotics Coordination</h1>
    <p id="patternLabel">Pattern: Circle Formation</p>
    <p>
      Agents coordinate using alignment, cohesion, separation, and target seeking.
      Trails and role colors visualize smooth distributed behavior.
    </p>
    <div class="legend">
      <span class="legend-item"><span class="swatch leader"></span> Leaders</span>
      <span class="legend-item"><span class="swatch worker"></span> Workers</span>
      <span class="legend-item"><span class="swatch scout"></span> Scouts</span>
    </div>
  </div>

  <div class="footer-note">Auto-switching formations • Collision avoidance • Smooth trails</div>

  <script>
    const canvas = document.getElementById("swarmCanvas");
    const ctx = canvas.getContext("2d");
    const patternLabel = document.getElementById("patternLabel");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const CONFIG = {
      totalAgents: 54,
      maxSpeed: 2.35,
      maxForce: 0.055,
      neighborDist: 92,
      separationDist: 24,
      trailLength: 22,
      patternDuration: 560,
      targetRadius: 8,
      backgroundFade: 0.18
    };

    const ROLE_SETUP = [
      { name: "leader", color: "#ff6b6b", count: 6, size: 6.4 },
      { name: "worker", color: "#4ecdc4", count: 30, size: 4.6 },
      { name: "scout", color: "#ffd166", count: 18, size: 4.1 }
    ];

    const PATTERNS = [
      { key: "circle", label: "Circle Formation" },
      { key: "grid", label: "Grid Formation" },
      { key: "wave", label: "Wave Sweep" },
      { key: "orbit", label: "Dual Orbit" }
    ];

    let patternIndex = 0;
    let patternTimer = 0;

    function limitVector(x, y, max) {
      const mag = Math.hypot(x, y) || 1;
      if (mag > max) {
        return { x: (x / mag) * max, y: (y / mag) * max };
      }
      return { x, y };
    }

    function hexToRgba(hex, alpha) {
      const clean = hex.replace("#", "");
      const value = parseInt(clean, 16);
      const r = (value >> 16) & 255;
      const g = (value >> 8) & 255;
      const b = value & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function seek(agent, targetX, targetY) {
      let desiredX = targetX - agent.x;
      let desiredY = targetY - agent.y;
      const distance = Math.hypot(desiredX, desiredY) || 1;

      desiredX = (desiredX / distance) * CONFIG.maxSpeed;
      desiredY = (desiredY / distance) * CONFIG.maxSpeed;

      let steerX = desiredX - agent.vx;
      let steerY = desiredY - agent.vy;

      return limitVector(steerX, steerY, CONFIG.maxForce);
    }

    class Agent {
      constructor(x, y, role, id) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.ax = 0;
        this.ay = 0;
        this.role = role;
        this.id = id;
        this.size = role.size;
        this.target = { x, y };
        this.trail = [];
      }

      applyForce(fx, fy) {
        this.ax += fx;
        this.ay += fy;
      }

      runBehaviors(agents) {
        let alignX = 0, alignY = 0, alignCount = 0;
        let cohesionX = 0, cohesionY = 0, cohesionCount = 0;
        let separationX = 0, separationY = 0;

        for (const other of agents) {
          if (other === this) continue;

          const dx = other.x - this.x;
          const dy = other.y - this.y;
          const d = Math.hypot(dx, dy);

          if (d > 0 && d < CONFIG.neighborDist) {
            alignX += other.vx;
            alignY += other.vy;
            alignCount++;

            cohesionX += other.x;
            cohesionY += other.y;
            cohesionCount++;
          }

          if (d > 0 && d < CONFIG.separationDist) {
            separationX -= dx / d;
            separationY -= dy / d;
          }
        }

        if (alignCount > 0) {
          alignX /= alignCount;
          alignY /= alignCount;
          const aligned = limitVector(alignX, alignY, CONFIG.maxSpeed);
          this.applyForce((aligned.x - this.vx) * 0.032, (aligned.y - this.vy) * 0.032);
        }

        if (cohesionCount > 0) {
          cohesionX /= cohesionCount;
          cohesionY /= cohesionCount;
          const cohesion = seek(this, cohesionX, cohesionY);
          this.applyForce(cohesion.x * 0.02, cohesion.y * 0.02);
        }

        this.applyForce(separationX * 0.075, separationY * 0.075);

        const targetForce = seek(this, this.target.x, this.target.y);
        const roleWeight =
          this.role.name === "leader" ? 0.06 :
          this.role.name === "scout" ? 0.05 : 0.043;

        this.applyForce(targetForce.x * roleWeight, targetForce.y * roleWeight);
      }

      update() {
        this.vx += this.ax;
        this.vy += this.ay;

        const limited = limitVector(this.vx, this.vy, CONFIG.maxSpeed);
        this.vx = limited.x;
        this.vy = limited.y;

        this.x += this.vx;
        this.y += this.vy;

        this.ax = 0;
        this.ay = 0;

        this.wrapAround();

        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > CONFIG.trailLength) {
          this.trail.shift();
        }
      }

      wrapAround() {
        if (this.x < -10) this.x = canvas.width + 10;
        if (this.x > canvas.width + 10) this.x = -10;
        if (this.y < -10) this.y = canvas.height + 10;
        if (this.y > canvas.height + 10) this.y = -10;
      }

      drawTrail() {
        for (let i = 0; i < this.trail.length; i++) {
          const p = this.trail[i];
          const alpha = (i / this.trail.length) * 0.42;
          ctx.fillStyle = hexToRgba(this.role.color, alpha);
          ctx.beginPath();
          ctx.arc(p.x, p.y, 1.7 + (i / this.trail.length) * 1.3, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      drawTargetHint() {
        ctx.beginPath();
        ctx.strokeStyle = hexToRgba(this.role.color, 0.14);
        ctx.lineWidth = 1;
        ctx.arc(this.target.x, this.target.y, CONFIG.targetRadius, 0, Math.PI * 2);
        ctx.stroke();
      }

      drawBody() {
        const angle = Math.atan2(this.vy, this.vx);

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(angle);

        ctx.fillStyle = this.role.color;
        ctx.beginPath();
        ctx.moveTo(this.size + 3, 0);
        ctx.lineTo(-this.size, this.size * 0.72);
        ctx.lineTo(-this.size * 0.45, 0);
        ctx.lineTo(-this.size, -this.size * 0.72);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.beginPath();
        ctx.arc(0.8, 0, 1.1, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      draw() {
        this.drawTrail();
        this.drawTargetHint();
        this.drawBody();
      }
    }

    const agents = [];
    let agentId = 0;

    for (const role of ROLE_SETUP) {
      for (let i = 0; i < role.count; i++) {
        agents.push(
          new Agent(
            Math.random() * canvas.width,
            Math.random() * canvas.height,
            role,
            agentId++
          )
        );
      }
    }

    function updateTargets() {
      const pattern = PATTERNS[patternIndex].key;
      patternLabel.textContent = `Pattern: ${PATTERNS[patternIndex].label}`;

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      agents.forEach((agent, i) => {
        if (pattern === "circle") {
          const angle = (i / agents.length) * Math.PI * 2 + patternTimer * 0.01;
          const radiusBase = Math.min(canvas.width, canvas.height) * 0.26;
          const radius =
            radiusBase +
            (agent.role.name === "leader" ? 38 : agent.role.name === "scout" ? -12 : 0);

          agent.target.x = cx + Math.cos(angle) * radius;
          agent.target.y = cy + Math.sin(angle) * radius;
        }

        else if (pattern === "grid") {
          const cols = Math.ceil(Math.sqrt(agents.length));
          const spacing = Math.min(48, canvas.width / 14);
          const row = Math.floor(i / cols);
          const col = i % cols;
          const rows = Math.ceil(agents.length / cols);
          const offsetX = ((cols - 1) * spacing) / 2;
          const offsetY = ((rows - 1) * spacing) / 2;

          agent.target.x = cx + col * spacing - offsetX;
          agent.target.y = cy + row * spacing - offsetY;
        }

        else if (pattern === "wave") {
          const spread = canvas.width * 0.72;
          const x = cx - spread / 2 + (i / Math.max(agents.length - 1, 1)) * spread;
          const waveOffset = Math.sin(i * 0.42 + patternTimer * 0.07) * 90;
          const roleOffset =
            agent.role.name === "leader" ? -30 :
            agent.role.name === "scout" ? 30 : 0;

          agent.target.x = x;
          agent.target.y = cy + waveOffset + roleOffset;
        }

        else if (pattern === "orbit") {
          const angle = (i / agents.length) * Math.PI * 2 + patternTimer * 0.015;
          const outer = Math.min(canvas.width, canvas.height) * 0.30;
          const inner = Math.min(canvas.width, canvas.height) * 0.17;
          const useOuter = agent.role.name !== "worker";
          const radius = useOuter ? outer : inner;
          const direction = agent.role.name === "scout" ? -1 : 1;

          agent.target.x = cx + Math.cos(angle * direction) * radius;
          agent.target.y = cy + Math.sin(angle * direction) * radius;
        }
      });
    }

    function drawConnections() {
      for (let i = 0; i < agents.length; i++) {
        for (let j = i + 1; j < agents.length; j++) {
          const a = agents[i];
          const b = agents[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy);

          if (dist < 70) {
            const alpha = (1 - dist / 70) * 0.08;
            ctx.strokeStyle = "rgba(255,255,255," + alpha + ")";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
    }

    function drawCenterGlow() {
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      const gradient = ctx.createRadialGradient(cx, cy, 20, cx, cy, Math.min(canvas.width, canvas.height) * 0.35);
      gradient.addColorStop(0, "rgba(78, 205, 196, 0.08)");
      gradient.addColorStop(0.45, "rgba(255, 209, 102, 0.05)");
      gradient.addColorStop(1, "rgba(0, 0, 0, 0)");

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(cx, cy, Math.min(canvas.width, canvas.height) * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }

    function animate() {
      ctx.fillStyle = `rgba(8, 19, 31, ${CONFIG.backgroundFade})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawCenterGlow();

      patternTimer++;
      if (patternTimer > CONFIG.patternDuration) {
        patternTimer = 0;
        patternIndex = (patternIndex + 1) % PATTERNS.length;
      }

      updateTargets();
      drawConnections();

      for (const agent of agents) {
        agent.runBehaviors(agents);
      }

      for (const agent of agents) {
        agent.update();
        agent.draw();
      }

      requestAnimationFrame(animate);
    }

    ctx.fillStyle = "#08131f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    animate();
  </script>
</body>
</html>
