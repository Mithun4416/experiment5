<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swarm Robotics Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0f0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 10;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #00d4ff, #7b61ff, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 0.75rem;
      color: #aaa;
    }

    .controls select,
    .controls input[type=range] {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0f0;
      padding: 3px 8px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .btn {
      background: linear-gradient(135deg, #7b61ff, #00d4ff);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn.danger {
      background: linear-gradient(135deg, #ff6b6b, #ff9e00);
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .legend {
      position: absolute;
      bottom: 14px;
      left: 16px;
      background: rgba(10,10,26,0.82);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.72rem;
      line-height: 2;
      backdrop-filter: blur(6px);
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stats {
      position: absolute;
      top: 10px;
      right: 14px;
      background: rgba(10,10,26,0.82);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.72rem;
      line-height: 1.9;
      backdrop-filter: blur(6px);
      min-width: 170px;
    }

    .stats span { color: #00d4ff; font-weight: 600; }
  </style>
</head>
<body>

<header>
  <h1>⬡ Swarm Robotics Simulator</h1>
  <div class="controls">
    <label>Mode:
      <select id="modeSelect">
        <option value="flock">Flocking</option>
        <option value="formation">Formation</option>
        <option value="target">Target Hunt</option>
        <option value="explore">Exploration</option>
      </select>
    </label>
    <label>Agents:
      <input type="range" id="agentCount" min="10" max="120" value="50" step="1">
      <span id="agentCountVal">50</span>
    </label>
    <label>Speed:
      <input type="range" id="speedSlider" min="0.5" max="3" value="1" step="0.1">
    </label>
    <button class="btn" id="addTarget">＋ Target</button>
    <button class="btn danger" id="resetBtn">↺ Reset</button>
  </div>
</header>

<div id="canvas-wrap">
  <canvas id="c"></canvas>

  <div class="legend">
    <div class="legend-row"><div class="dot" style="background:#00d4ff"></div> Scout</div>
    <div class="legend-row"><div class="dot" style="background:#7b61ff"></div> Worker</div>
    <div class="legend-row"><div class="dot" style="background:#ff6b6b"></div> Leader</div>
    <div class="legend-row"><div class="dot" style="background:#00ffaa"></div> Reached Target</div>
    <div class="legend-row"><div class="dot" style="background:#ff9e00;border-radius:0"></div> ■ Target</div>
  </div>

  <div class="stats">
    🤖 Agents: <span id="sAgents">50</span><br>
    🎯 Targets: <span id="sTargets">0</span><br>
    ✅ Reached: <span id="sReached">0</span><br>
    📡 Mode: <span id="sMode">Flocking</span><br>
    ⏱ Tick: <span id="sTick">0</span>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  let W, H;
  function resize() {
    W = canvas.width  = wrap.clientWidth;
    H = canvas.height = wrap.clientHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); });

  // ─── Config ────────────────────────────────────────────────────────────────
  const CFG = {
    trailLen:      28,
    perceptionR:   80,
    separationR:   22,
    maxForce:      0.18,
    maxSpeed:      2.0,
    leaderRatio:   0.1,
    scoutRatio:    0.25,
    targetRadius:  18,
    formationNames:['triangle','square','circle','star'],
  };

  let speedMul = 1;
  let mode     = 'flock';
  let tick     = 0;
  let reached  = 0;

  // ─── Roles ─────────────────────────────────────────────────────────────────
  const ROLES = {
    leader: { color:'#ff6b6b', glow:'rgba(255,107,107,0.35)', size: 6 },
    scout:  { color:'#00d4ff', glow:'rgba(0,212,255,0.3)',    size: 4.5 },
    worker: { color:'#7b61ff', glow:'rgba(123,97,255,0.3)',   size: 4 },
    done:   { color:'#00ffaa', glow:'rgba(0,255,170,0.4)',    size: 5 },
  };

  // ─── Targets ───────────────────────────────────────────────────────────────
  let targets = [];
  function addTarget(x, y) {
    targets.push({ x: x ?? rnd(80, W-80), y: y ?? rnd(80, H-80), reached: false });
  }

  // ─── Helpers ───────────────────────────────────────────────────────────────
  const rnd  = (a, b) => a + Math.random()*(b-a);
  const dist = (a, b) => Math.hypot(a.x-b.x, a.y-b.y);
  function limit(v, max) {
    const m = Math.hypot(v.x, v.y);
    if (m > max) { v.x = v.x/m*max; v.y = v.y/m*max; }
  }
  function add(a,b){ return {x:a.x+b.x, y:a.y+b.y}; }
  function sub(a,b){ return {x:a.x-b.x, y:a.y-b.y}; }
  function scale(v,s){ return {x:v.x*s, y:v.y*s}; }
  function norm(v){
    const m=Math.hypot(v.x,v.y)||1;
    return {x:v.x/m,y:v.y/m};
  }

  // ─── Agent ─────────────────────────────────────────────────────────────────
  class Agent {
    constructor(role) {
      this.x    = rnd(40, W-40);
      this.y    = rnd(40, H-40);
      this.vx   = rnd(-1.5, 1.5);
      this.vy   = rnd(-1.5, 1.5);
      this.ax   = 0; this.ay = 0;
      this.role = role;
      this.trail = [];
      this.done  = false;
      this.formTarget = null;
      this.wobble = rnd(0, Math.PI*2);
    }

    applyForce(fx, fy) { this.ax += fx; this.ay += fy; }

    neighbours(agents) {
      return agents.filter(a => a !== this && dist(this, a) < CFG.perceptionR);
    }

    // ── Steering behaviours ──────────────────────────────────────────────────
    separate(nbs) {
      let sx=0, sy=0, cnt=0;
      for (const nb of nbs) {
        const d = dist(this, nb);
        if (d < CFG.separationR && d > 0) {
          const dx = (this.x-nb.x)/d, dy = (this.y-nb.y)/d;
          sx += dx/d; sy += dy/d; cnt++;
        }
      }
      if (!cnt) return {x:0,y:0};
      return scale(norm({x:sx/cnt,y:sy/cnt}), CFG.maxForce*1.6);
    }

    align(nbs) {
      if (!nbs.length) return {x:0,y:0};
      let ax=0,ay=0;
      for(const nb of nbs){ax+=nb.vx;ay+=nb.vy;}
      return scale(norm({x:ax/nbs.length,y:ay/nbs.length}), CFG.maxForce);
    }

    cohere(nbs) {
      if (!nbs.length) return {x:0,y:0};
      let cx=0,cy=0;
      for(const nb of nbs){cx+=nb.x;cy+=nb.y;}
      cx/=nbs.length; cy/=nbs.length;
      return scale(norm({x:cx-this.x,y:cy-this.y}), CFG.maxForce*0.7);
    }

    seek(tx, ty, str=1) {
      const dx=tx-this.x, dy=ty-this.y;
      return scale(norm({x:dx,y:dy}), CFG.maxForce*str);
    }

    wander() {
      this.wobble += rnd(-0.3,0.3);
      return { x: Math.cos(this.wobble)*CFG.maxForce*0.5,
               y: Math.sin(this.wobble)*CFG.maxForce*0.5 };
    }

    edges() {
      const margin=30, str=0.3;
      let fx=0,fy=0;
      if(this.x<margin)         fx= str;
      if(this.x>W-margin)       fx=-str;
      if(this.y<margin)         fy= str;
      if(this.y>H-margin)       fy=-str;
      return {x:fx,y:fy};
    }

    update(agents) {
      this.ax = 0; this.ay = 0;
      const nbs = this.neighbours(agents);
      const sp  = this.separate(nbs);
      const al  = this.align(nbs);
      const co  = this.cohere(nbs);
      const ed  = this.edges();
      const w   = this.wander();
      const ms  = CFG.maxSpeed * speedMul;
      const mf  = CFG.maxForce;

      if (mode === 'flock') {
        this.applyForce(sp.x*2.0, sp.y*2.0);
        this.applyForce(al.x*1.0, al.y*1.0);
        this.applyForce(co.x*0.8, co.y*0.8);
        this.applyForce(ed.x*1.2, ed.y*1.2);

        if (this.role==='leader') {
          const ww = this.wander();
          this.applyForce(ww.x*1.5, ww.y*1.5);
        }

      } else if (mode === 'formation') {
        if (this.formTarget) {
          const sk = this.seek(this.formTarget.x, this.formTarget.y, 1.4);
          this.applyForce(sk.x, sk.y);
        }
        this.applyForce(sp.x*2.5, sp.y*2.5);
        this.applyForce(ed.x*1.5, ed.y*1.5);

      } else if (mode === 'target') {
        const active = targets.filter(t=>!t.reached);
        if (active.length) {
          let closest = active.reduce((best,t)=>dist(this,t)<dist(this,best)?t:best, active[0]);
          if (this.role==='leader' || this.role==='scout') {
            const sk = this.seek(closest.x, closest.y, 1.5);
            this.applyForce(sk.x, sk.y);
          } else {
            // workers follow scouts/leaders
            const scouts = agents.filter(a=>a.role==='scout'||a.role==='leader');
            const csk = scouts.length ? this.seek(
              scouts.reduce((s,a)=>s+a.x,0)/scouts.length,
              scouts.reduce((s,a)=>s+a.y,0)/scouts.length, 0.9
            ) : this.seek(closest.x, closest.y, 0.9);
            this.applyForce(csk.x, csk.y);
          }
          if (dist(this, closest) < CFG.targetRadius+4 && !this.done) {
            this.done = true;
            this.role = 'done';
            closest.reached = true;
            reached++;
          }
        }
        this.applyForce(sp.x*2.0, sp.y*2.0);
        this.applyForce(al.x*0.5, al.y*0.5);
        this.applyForce(ed.x*1.5, ed.y*1.5);

      } else if (mode === 'explore') {
        const visited = { x: this.x, y: this.y };
        this.applyForce(w.x*2.5, w.y*2.5);
        this.applyForce(sp.x*2.8, sp.y*2.8);
        this.applyForce(ed.x*2.0, ed.y*2.0);
        if (this.role==='leader') {
          const wl = this.wander();
          this.applyForce(wl.x*1.8, wl.y*1.8);
        }
      }

      limit({x:this.ax,y:this.ay}, mf*2);
      this.vx += this.ax; this.vy += this.ay;
      limit({x:this.vx,y:this.vy}||(this.vel={}), ms); // manual
      const spd = Math.hypot(this.vx,this.vy);
      if(spd>ms){ this.vx=this.vx/spd*ms; this.vy=this.vy/spd*ms; }

      this.trail.push({x:this.x, y:this.y});
      if(this.trail.length > CFG.trailLen) this.trail.shift();

      this.x += this.vx;
      this.y += this.vy;

      // hard clamp
      this.x = Math.max(8, Math.min(W-8, this.x));
      this.y = Math.max(8, Math.min(H-8, this.y));
    }

    draw() {
      const info = ROLES[this.done ? 'done' : this.role] || ROLES.worker;

      // Trail
      if (this.trail.length > 1) {
        ctx.save();
        for (let i=1; i<this.trail.length; i++) {
          const alpha = (i/this.trail.length)*0.45;
          const width = (i/this.trail.length)*2.2;
          ctx.beginPath();
          ctx.strokeStyle = info.color.replace(')',`,${alpha})`).replace('rgb','rgba').replace('#','rgba(').replace(/([0-9a-f]{2})/gi, (m,p)=>parseInt(p,16)+',');
          // simpler approach:
          ctx.globalAlpha = alpha;
          ctx.lineWidth   = width;
          ctx.strokeStyle = info.color;
          ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
          ctx.lineTo(this.trail[i].x,   this.trail[i].y);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      // Glow
      ctx.save();
      ctx.shadowColor = info.glow;
      ctx.shadowBlur  = 14;

      // Body
      const angle = Math.atan2(this.vy, this.vx);
      const r = info.size;
      ctx.beginPath();
      ctx.translate(this.x, this.y);
      ctx.rotate(angle);
      // Arrow/robot shape
      ctx.moveTo( r*2,   0);
      ctx.lineTo(-r,     r);
      ctx.lineTo(-r*0.4, 0);
      ctx.lineTo(-r,    -r);
      ctx.closePath();
      ctx.fillStyle   = info.color;
      ctx.fill();

      // Core dot
      ctx.beginPath();
      ctx.arc(0, 0, r*0.45, 0, Math.PI*2);
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.7;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();

      // perception ring for leaders
      if (this.role==='leader') {
        ctx.save();
        ctx.beginPath();
        ctx.arc(this.x, this.y, CFG.perceptionR, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,107,107,0.08)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4,4]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    }
  }

  // ─── Agents pool ───────────────────────────────────────────────────────────
  let agents = [];

  function assignRoles(list) {
    const n = list.length;
    const nLeaders = Math.max(1, Math.floor(n * CFG.leaderRatio));
    const nScouts  = Math.max(2, Math.floor(n * CFG.scoutRatio));
    list.forEach((a, i) => {
      if (i < nLeaders)           a.role = 'leader';
      else if (i < nLeaders+nScouts) a.role = 'scout';
      else                           a.role = 'worker';
      a.done = false;
    });
  }

  function buildFormation(n) {
    const cx = W/2, cy = H/2;
    const pts = [];
    const name = CFG.formationNames[ Math.floor(tick/600) % CFG.formationNames.length ];

    if (name==='circle') {
      for(let i=0;i<n;i++){
        const a = (i/n)*Math.PI*2;
        const r = Math.min(W,H)*0.28;
        pts.push({x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r});
      }
    } else if (name==='triangle') {
      const sides=3, perSide=Math.ceil(n/sides);
      const R=Math.min(W,H)*0.3;
      for(let s=0;s<sides&&pts.length<n;s++){
        const a1=(s/sides)*Math.PI*2-Math.PI/2;
        const a2=((s+1)/sides)*Math.PI*2-Math.PI/2;
        for(let j=0;j<perSide&&pts.length<n;j++){
          const t=j/perSide;
          pts.push({
            x:cx+Math.cos(a1)*R*(1-t)+Math.cos(a2)*R*t,
            y:cy+Math.sin(a1)*R*(1-t)+Math.sin(a2)*R*t
          });
        }
      }
    } else if (name==='square') {
      const sides=4, perSide=Math.ceil(n/sides);
      const R=Math.min(W,H)*0.25;
      const corners=[[-1,-1],[1,-1],[1,1],[-1,1]];
      for(let s=0;s<sides&&pts.length<n;s++){
        const [x1,y1]=corners[s], [x2,y2]=corners[(s+1)%sides];
        for(let j=0;j<perSide&&pts.length<n;j++){
          const t=j/perSide;
          pts.push({x:cx+(x1*(1-t)+x2*t)*R, y:cy+(y1*(1-t)+y2*t)*R});
        }
      }
    } else { // star
      for(let i=0;i<n;i++){
        const a=(i/n)*Math.PI*2;
        const r2=((i%2===0)?1:0.45)*Math.min(W,H)*0.28;
        pts.push({x:cx+Math.cos(a)*r2, y:cy+Math.sin(a)*r2});
      }
    }
    while(pts.length<n) pts.push({x:cx,y:cy});
    return pts;
  }

  function spawnAgents(n) {
    agents = [];
    for(let i=0;i<n;i++) agents.push(new Agent('worker'));
    assignRoles(agents);
    reached = 0;
  }

  // ─── Draw targets ──────────────────────────────────────────────────────────
  function drawTargets() {
    for (const t of targets) {
      ctx.save();
      ctx.shadowColor = t.reached ? '#00ffaa' : '#ff9e00';
      ctx.shadowBlur  = 20;
      const pulse = 1 + 0.15*Math.sin(tick*0.07);
      const r = CFG.targetRadius * pulse;

      // Ring
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI*2);
      ctx.strokeStyle = t.reached ? '#00ffaa' : '#ff9e00';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Inner cross
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.moveTo(t.x-r*0.5, t.y); ctx.lineTo(t.x+r*0.5, t.y);
      ctx.moveTo(t.x, t.y-r*0.5); ctx.lineTo(t.x, t.y+r*0.5);
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Filled dot
      ctx.beginPath();
      ctx.arc(t.x, t.y, 4, 0, Math.PI*2);
      ctx.fillStyle = t.reached ? '#00ffaa' : '#ff9e00';
      ctx.fill();
      ctx.restore();
    }
  }

  // ─── Draw grid ─────────────────────────────────────────────────────────────
  function drawGrid() {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    const step = 60;
    for(let x=0;x<W;x+=step){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
    for(let y=0;y<H;y+=step){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
    ctx.restore();
  }

  // ─── Draw connection lines (neighbours) ────────────────────────────────────
  function drawConnections() {
    for (const a of agents) {
      for (const b of agents) {
        if (b === a) continue;
        const d = dist(a, b);
        if (d < CFG.perceptionR*0.55) {
          const alpha = (1 - d/(CFG.perceptionR*0.55))*0.12;
          ctx.save();
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(123,97,255,${alpha})`;
          ctx.lineWidth = 0.7;
          ctx.stroke();
          ctx.restore();
        }
      }
    }
  }

  // ─── Main loop ─────────────────────────────────────────────────────────────
  function loop() {
    ctx.clearRect(0,0,W,H);
    drawGrid();

    // Formation targets
    if (mode==='formation') {
      const pts = buildFormation(agents.length);
      agents.forEach((a,i)=>a.formTarget=pts[i]);
    }

    drawConnections();
    drawTargets();

    for (const a of agents) { a.update(agents); a.draw(); }

    // Stats
    tick++;
    document.getElementById('sAgents').textContent  = agents.length;
    document.getElementById('sTargets').textContent = targets.length;
    document.getElementById('sReached').textContent = reached;
    document.getElementById('sMode').textContent    = mode.charAt(0).toUpperCase()+mode.slice(1);
    document.getElementById('sTick').textContent    = tick;

    requestAnimationFrame(loop);
  }

  // ─── UI Bindings ───────────────────────────────────────────────────────────
  document.getElementById('modeSelect').addEventListener('change', e => {
    mode = e.target.value;
    if (mode==='target' && targets.length===0) {
      addTarget(); addTarget(); addTarget();
    }
    agents.forEach(a=>{ a.done=false; if(a.role==='done') a.role='worker'; });
    reached=0;
    assignRoles(agents);
  });

  const agentSlider = document.getElementById('agentCount');
  agentSlider.addEventListener('input', e => {
    document.getElementById('agentCountVal').textContent = e.target.value;
    const n = parseInt(e.target.value);
    while(agents.length < n) agents.push(new Agent('worker'));
    while(agents.length > n) agents.pop();
    assignRoles(agents);
  });

  document.getElementById('speedSlider').addEventListener('input', e => {
    speedMul = parseFloat(e.target.value);
  });

  document.getElementById('addTarget').addEventListener('click', () => {
    addTarget();
    if (mode !== 'target') {
      mode='target';
      document.getElementById('modeSelect').value='target';
      agents.forEach(a=>{ a.done=false; if(a.role==='done') a.role='worker'; });
      assignRoles(agents);
    }
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    targets=[]; reached=0; tick=0;
    spawnAgents(parseInt(agentSlider.value));
  });

  // Click canvas to add target
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const sx = W/rect.width, sy = H/rect.height;
    addTarget((e.clientX-rect.left)*sx, (e.clientY-rect.top)*sy);
    if(mode!=='target'){
      mode='target';
      document.getElementById('modeSelect').value='target';
      assignRoles(agents);
    }
  });

  // ─── Init ──────────────────────────────────────────────────────────────────
  spawnAgents(50);
  loop();

})();
</script>
</body>
</html>
