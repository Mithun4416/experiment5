<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌳 Fractal Tree – Growing from Seed</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#0a0a12;display:flex;justify-content:center;align-items:flex-end;height:100vh}
  canvas{display:block}
  #info{position:fixed;top:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.55);
    font:14px/1 'Segoe UI',system-ui,sans-serif;letter-spacing:1.2px;pointer-events:none;
    text-align:center;transition:opacity 1.2s ease}
  #restart{position:fixed;bottom:22px;right:22px;padding:10px 22px;
    background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);
    border:1px solid rgba(255,255,255,.15);border-radius:10px;cursor:pointer;
    font:14px 'Segoe UI',system-ui,sans-serif;backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);transition:all .3s ease;user-select:none}
  #restart:hover{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.3)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">🌱 Watch the seed grow…</div>
<button id="restart">🔄 Regrow</button>
<script>
/* ================================================================
   FRACTAL TREE – GROWING FROM SEED
   Pure HTML5 Canvas · Zero Dependencies · 60 fps
   ================================================================ */
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,bx,by,t=0,gGrow=0,growing=!0;
let branches=[],lvs=[],fallLvs=[],pts=[];
let phase=0; // 0 seed-fall 1 landed 2 crack 3 tree

/* ── palette ─────────────────────────────────────── */
const LEAF=['#4CAF50','#66BB6A','#81C784','#A5D6A7','#388E3C','#2E7D32','#43A047'];
const BARK=['#5D4037','#6D4C41','#4E342E','#795548'];

/* ── config ──────────────────────────────────────── */
const CFG={
  maxD:11,trunkL:0,shrink:.72,spread:.45,spreadVar:.15,
  swayAmt:.025,swaySpd:.8,growSpd:.004,leafSz:6
};

/* ── resize ──────────────────────────────────────── */
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;
  bx=W/2;by=H*.85;CFG.trunkL=H*.28}
addEventListener('resize',resize);resize();

/* ── seed object ─────────────────────────────────── */
let S={x:0,y:-40,vy:0,rot:0,sc:1,op:1,crack:0};
function resetSeed(){S={x:bx,y:-40,vy:0,rot:0,sc:1,op:1,crack:0}}
resetSeed();

/* ── draw seed ───────────────────────────────────── */
function drawSeed(s){
  X.save();X.translate(s.x,s.y);X.rotate(s.rot);X.scale(s.sc,s.sc);X.globalAlpha=s.op;
  /* body */
  let g=X.createRadialGradient(0,2,2,0,0,14);
  g.addColorStop(0,'#C8A26A');g.addColorStop(.6,'#8B6914');g.addColorStop(1,'#5D4E37');
  X.fillStyle=g;X.beginPath();X.ellipse(0,4,10,12,0,0,Math.PI*2);X.fill();
  /* cap */
  X.fillStyle='#4E342E';X.beginPath();X.ellipse(0,-5,11,7,0,Math.PI,Math.PI*2);X.fill();
  X.strokeStyle='#3E2723';X.lineWidth=.8;
  for(let i=-8;i<=8;i+=3){X.beginPath();X.moveTo(i,-9);X.lineTo(i*.8,-3);X.stroke()}
  /* stem */
  X.strokeStyle='#5D4037';X.lineWidth=2;X.beginPath();X.moveTo(0,-12);X.lineTo(0,-18);X.stroke();
  /* crack */
  if(s.crack>0){
    X.strokeStyle='#A5D6A7';X.lineWidth=1.5;X.globalAlpha=s.crack;
    X.beginPath();X.moveTo(0,-2);X.lineTo(-3*s.crack,5*s.crack);X.lineTo(2*s.crack,10*s.crack);X.stroke();
    let cg=X.createRadialGradient(0,5,0,0,5,20*s.crack);
    cg.addColorStop(0,`rgba(76,175,80,${.4*s.crack})`);cg.addColorStop(1,'rgba(76,175,80,0)');
    X.fillStyle=cg;X.beginPath();X.arc(0,5,20*s.crack,0,Math.PI*2);X.fill();
  }
  X.restore();
}

/* ── build recursive tree ────────────────────────── */
function genTree(){branches=[];lvs=[];build(bx,by,-Math.PI/2,CFG.trunkL,0,0)}
function build(x,y,a,l,d,pd){
  if(d>CFG.maxD||l<3)return;
  let dl=pd+.06;
  branches.push({x1:x,y1:y,a,l,d,dl,
    th:Math.max(1,(CFG.maxD-d)*1.8),
    so:Math.random()*Math.PI*2,sm:d*.4,
    col:BARK[d%BARK.length]});
  let ex=x+Math.cos(a)*l, ey=y+Math.sin(a)*l;
  if(d>=CFG.maxD-3){
    let n=d>=CFG.maxD-1?3:1;
    for(let i=0;i<n;i++)
      lvs.push({x:ex+(Math.random()-.5)*8,y:ey+(Math.random()-.5)*8,
        sz:CFG.leafSz*(.6+Math.random()*.6),
        col:LEAF[Math.random()*LEAF.length|0],
        a:a+(Math.random()-.5)*1.2,dl:dl+.08,
        so:Math.random()*Math.PI*2,sm:d*.5,op:0});
  }
  let nl=l*(CFG.shrink+(Math.random()-.5)*.08);
  let sp=CFG.spread+(Math.random()-.5)*CFG.spreadVar;
  build(ex,ey,a-sp,nl,d+1,dl);
  build(ex,ey,a+sp,nl,d+1,dl);
  if(d>2&&d<CFG.maxD-2&&Math.random()>.6)
    build(ex,ey,a+(Math.random()-.5)*sp*1.5,nl*.7,d+1,dl);
}

/* ── easing ──────────────────────────────────────── */
function eoC(t){return 1-Math.pow(1-t,3)}
function eoB(t){const c=1.7;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2)}

/* ── color helper ────────────────────────────────── */
function lighten(h,a){
  let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`}

/* ── draw sky ────────────────────────────────────── */
function drawSky(){
  let g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0B1026');g.addColorStop(.55,'#1a2a4a');
  g.addColorStop(.82,'#2a3a2a');g.addColorStop(1,'#1a1a0e');
  X.fillStyle=g;X.fillRect(0,0,W,H);
  /* stars */
  X.fillStyle='rgba(255,255,255,.5)';
  for(let i=0;i<140;i++){
    let sx=(i*7919+42)%W,sy=(i*6271+42)%(H*.55),
        sr=.5+(i%3)*.5,fl=.4+.6*Math.sin(t*.5+i);
    X.globalAlpha=fl*.6;X.beginPath();X.arc(sx,sy,sr,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
  /* moon */
  let mg=X.createRadialGradient(W*.82,H*.11,10,W*.82,H*.11,44);
  mg.addColorStop(0,'rgba(255,255,230,.9)');mg.addColorStop(.5,'rgba(255,255,200,.3)');
  mg.addColorStop(1,'rgba(255,255,200,0)');
  X.fillStyle=mg;X.beginPath();X.arc(W*.82,H*.11,44,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,255,220,.95)';X.beginPath();X.arc(W*.82,H*.11,18,0,Math.PI*2);X.fill();
  /* ground */
  X.fillStyle='#1a1a0e';X.beginPath();X.ellipse(bx,by+10,W*.5,30,0,0,Math.PI*2);X.fill();
}

/* ── draw branch ─────────────────────────────────── */
function drawBr(b,gr){
  let p=Math.max(0,Math.min(1,(gr-b.dl)/.08));if(p<=0)return;
  let sw=Math.sin(t*CFG.swaySpd+b.so)*CFG.swayAmt*b.sm,
      ca=b.a+sw,cl=b.l*eoC(p),
      ex=b.x1+Math.cos(ca)*cl,ey=b.y1+Math.sin(ca)*cl;
  /* shadow */
  if(b.d<4){X.strokeStyle='rgba(0,0,0,.12)';X.lineWidth=b.th+2;X.lineCap='round';
    X.beginPath();X.moveTo(b.x1+3,b.y1+3);X.lineTo(ex+3,ey+3);X.stroke()}
  /* branch */
  let bc=b.d<3?'#5D4037':b.col,
      bg=X.createLinearGradient(b.x1,b.y1,ex,ey);
  bg.addColorStop(0,bc);bg.addColorStop(1,lighten(bc,18));
  X.strokeStyle=bg;X.lineWidth=b.th*(1-p*.1+.1);X.lineCap='round';X.lineJoin='round';
  let mx=(b.x1+ex)/2+Math.sin(ca)*b.l*.05,
      my=(b.y1+ey)/2+Math.cos(ca)*b.l*.05;
  X.beginPath();X.moveTo(b.x1,b.y1);X.quadraticCurveTo(mx,my,ex,ey);X.stroke();
}

/* ── draw leaf ───────────────────────────────────── */
function drawLf(lf,gr){
  let p=Math.max(0,Math.min(1,(gr-lf.dl)/.06));if(p<=0)return;
  let sw=Math.sin(t*CFG.swaySpd*1.2+lf.so)*CFG.swayAmt*lf.sm,
      ca=lf.a+sw,sc=eoB(p),sz=lf.sz*sc;
  X.save();X.translate(lf.x,lf.y);X.rotate(ca);X.globalAlpha=p*.9;
  /* glow */
  let gg=X.createRadialGradient(0,0,0,0,0,sz*2);
  gg.addColorStop(0,lf.col+'40');gg.addColorStop(1,'transparent');
  X.fillStyle=gg;X.beginPath();X.arc(0,0,sz*2,0,Math.PI*2);X.fill();
  /* teardrop */
  X.fillStyle=lf.col;X.beginPath();X.moveTo(0,-sz);
  X.bezierCurveTo(sz*.8,-sz*.5,sz*.6,sz*.5,0,sz);
  X.bezierCurveTo(-sz*.6,sz*.5,-sz*.8,-sz*.5,0,-sz);X.fill();
  /* vein */
  X.strokeStyle='rgba(0,0,0,.15)';X.lineWidth=.5;
  X.beginPath();X.moveTo(0,-sz*.8);X.lineTo(0,sz*.7);X.stroke();
  X.restore();
}

/* ── falling leaves ──────────────────────────────── */
let lastFL=0;
function spawnFL(){if(!lvs.length)return;
  let src=lvs[Math.random()*lvs.length|0];
  fallLvs.push({x:src.x,y:src.y,vx:(Math.random()-.5)*.8,vy:.3+Math.random()*.5,
    rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.03,
    sz:src.sz*(.6+Math.random()*.4),col:src.col,op:.8,
    sp:Math.random()*Math.PI*2})}
function updateFL(){
  for(let i=fallLvs.length-1;i>=0;i--){
    let f=fallLvs[i];f.x+=f.vx+Math.sin(t*1.5+f.sp)*.3;f.y+=f.vy;
    f.rot+=f.rs;f.op-=.002;
    if(f.y>by+50||f.op<=0)fallLvs.splice(i,1);
  }}
function drawFL(f){
  X.save();X.translate(f.x,f.y);X.rotate(f.rot);X.globalAlpha=f.op;
  X.fillStyle=f.col;let s=f.sz;
  X.beginPath();X.moveTo(0,-s);
  X.bezierCurveTo(s*.8,-s*.5,s*.6,s*.5,0,s);
  X.bezierCurveTo(-s*.6,s*.5,-s*.8,-s*.5,0,-s);X.fill();
  X.restore()}

/* ── particles ───────────────────────────────────── */
function addPt(x,y,col){
  pts.push({x,y,vx:(Math.random()-.5)*2,vy:-Math.random()*2-.5,
    life:1,sz:1+Math.random()*2,col:col||LEAF[Math.random()*LEAF.length|0]})}
function addDust(x,y){for(let i=0;i<10;i++)
  pts.push({x:x+(Math.random()-.5)*10,y,vx:(Math.random()-.5)*3,
    vy:-Math.random()*2,life:1,sz:2+Math.random()*2,col:'#8B7355'})}
function updPt(){for(let i=pts.length-1;i>=0;i--){
  let p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.02;p.life-=.02;
  if(p.life<=0)pts.splice(i,1)}}
function drawPt(){for(const p of pts){
  X.globalAlpha=p.life*.7;X.fillStyle=p.col;
  X.beginPath();X.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);X.fill()}
  X.globalAlpha=1}

/* ── main loop ───────────────────────────────────── */
let seedLand=0;
function loop(ts){
  t=ts*.001;X.clearRect(0,0,W,H);drawSky();

  if(phase===0){/* seed falling */
    S.vy+=.12;S.y+=S.vy;S.rot=Math.sin(t*3)*.3;
    if(S.y>=by-12){S.y=by-12;S.vy=0;phase=1;seedLand=t;addDust(S.x,by)}
    drawSeed(S);
  }else if(phase===1){/* pause */
    S.rot=0;drawSeed(S);if(t-seedLand>1)phase=2;
  }else if(phase===2){/* crack */
    S.crack=Math.min(1,S.crack+.015);drawSeed(S);
    if(S.crack>=1){phase=3;genTree();for(let i=0;i<20;i++)addPt(bx,by)}
  }else{/* tree */
    S.op=Math.max(0,S.op-.02);if(S.op>0)drawSeed(S);
    if(growing){gGrow+=CFG.growSpd;
      if(gGrow>=1.2){growing=!1;document.getElementById('info').style.opacity='0'}
      if(Math.random()>.85){let b=branches[Math.random()*branches.length|0];
        if(b)addPt(b.x1,b.y1)}}
    for(const b of branches)drawBr(b,gGrow);
    for(const l of lvs)drawLf(l,gGrow);
    if(!growing&&t-lastFL>2+Math.random()*3){spawnFL();lastFL=t}
    updateFL();for(const f of fallLvs)drawFL(f);
  }
  updPt();drawPt();
  requestAnimationFrame(loop);
}

/* ── restart ─────────────────────────────────────── */
function restart(){
  t=0;gGrow=0;growing=!0;phase=0;
  branches=[];lvs=[];fallLvs=[];pts=[];lastFL=0;
  resetSeed();S.x=bx;
  document.getElementById('info').style.opacity='1';
}
document.getElementById('restart').addEventListener('click',restart);
requestAnimationFrame(loop);
</script>
</body>
</html>
