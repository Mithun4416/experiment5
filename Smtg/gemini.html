<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Robotics Simulation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0b0f19;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .color-box {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h3>Swarm Coordination</h3>
        <div class="legend-item"><div class="color-box" style="background: cyan;"></div> Scouts (Seek Target)</div>
        <div class="legend-item"><div class="color-box" style="background: magenta;"></div> Workers (Follow Scouts)</div>
        <div class="legend-item"><div class="color-box" style="background: yellow; border-radius: 0;"></div> Dynamic Target</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Vector math utility
        class Vector {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { this.x += v.x; this.y += v.y; }
            sub(v) { return new Vector(this.x - v.x, this.y - v.y); }
            mult(n) { this.x *= n; this.y *= n; }
            mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            normalize() {
                let m = this.mag();
                if (m !== 0) { this.mult(1 / m); }
            }
            limit(max) {
                if (this.mag() > max) {
                    this.normalize();
                    this.mult(max);
                }
            }
            static dist(v1, v2) {
                let dx = v1.x - v2.x;
                let dy = v1.y - v2.y;
                return Math.sqrt(dx * dx + dy * dy);
            }
        }

        class Agent {
            constructor(x, y, role) {
                this.pos = new Vector(x, y);
                this.vel = new Vector(Math.random() * 2 - 1, Math.random() * 2 - 1);
                this.acc = new Vector(0, 0);
                this.role = role; // 'scout' or 'worker'
                
                // Role specific properties
                this.maxSpeed = role === 'scout' ? 4.5 : 3.5;
                this.maxForce = role === 'scout' ? 0.15 : 0.08;
                this.color = role === 'scout' ? 'cyan' : 'magenta';
                
                this.history = [];
                this.maxHistory = 20;
            }

            applyForce(force) {
                this.acc.add(force);
            }

            behaviors(agents, target) {
                let separate = this.separate(agents);
                let align = this.align(agents);
                let cohere = this.cohere(agents);
                let seek = this.seek(target);

                // Weighting behaviors based on roles
                if (this.role === 'scout') {
                    separate.mult(2.0);
                    align.mult(1.0);
                    cohere.mult(0.5);
                    seek.mult(1.5); // Scouts focus heavily on the target
                } else {
                    separate.mult(2.5); // Workers avoid collisions more strictly
                    align.mult(1.5);
                    cohere.mult(1.5); // Workers group up
                    seek.mult(0.2); // Workers barely care about the target directly
                }

                this.applyForce(separate);
                this.applyForce(align);
                this.applyForce(cohere);
                this.applyForce(seek);
            }

            seek(target) {
                let desired = new Vector(target.x - this.pos.x, target.y - this.pos.y);
                desired.normalize();
                desired.mult(this.maxSpeed);
                let steer = desired.sub(this.vel);
                steer.limit(this.maxForce);
                return steer;
            }

            separate(agents) {
                let desiredSeparation = 30;
                let steer = new Vector(0, 0);
                let count = 0;

                for (let other of agents) {
                    let d = Vector.dist(this.pos, other.pos);
                    if ((d > 0) && (d < desiredSeparation)) {
                        let diff = this.pos.sub(other.pos);
                        diff.normalize();
                        diff.mult(1 / d); // Weight by distance
                        steer.add(diff);
                        count++;
                    }
                }
                if (count > 0) {
                    steer.mult(1 / count);
                    steer.normalize();
                    steer.mult(this.maxSpeed);
                    steer.sub(this.vel);
                    steer.limit(this.maxForce * 1.5);
                }
                return steer;
            }

            align(agents) {
                let neighborDist = 60;
                let sum = new Vector(0, 0);
                let count = 0;
                for (let other of agents) {
                    let d = Vector.dist(this.pos, other.pos);
                    if ((d > 0) && (d < neighborDist)) {
                        sum.add(other.vel);
                        count++;
                    }
                }
                if (count > 0) {
                    sum.mult(1 / count);
                    sum.normalize();
                    sum.mult(this.maxSpeed);
                    let steer = sum.sub(this.vel);
                    steer.limit(this.maxForce);
                    return steer;
                }
                return new Vector(0, 0);
            }

            cohere(agents) {
                let neighborDist = 60;
                let sum = new Vector(0, 0);
                let count = 0;
                for (let other of agents) {
                    let d = Vector.dist(this.pos, other.pos);
                    if ((d > 0) && (d < neighborDist)) {
                        // Workers cohere preferentially to scouts
                        let weight = (this.role === 'worker' && other.role === 'scout') ? 2 : 1;
                        sum.add(new Vector(other.pos.x * weight, other.pos.y * weight));
                        count += weight;
                    }
                }
                if (count > 0) {
                    sum.mult(1 / count);
                    return this.seek(sum);
                }
                return new Vector(0, 0);
            }

            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0); // Reset acceleration

                // Boundaries (Bounce)
                let margin = 20;
                if (this.pos.x < margin) { this.vel.x += 0.5; }
                if (this.pos.x > width - margin) { this.vel.x -= 0.5; }
                if (this.pos.y < margin) { this.vel.y += 0.5; }
                if (this.pos.y > height - margin) { this.vel.y -= 0.5; }

                // Save history for trail
                this.history.push(new Vector(this.pos.x, this.pos.y));
                if (this.history.length > this.maxHistory) {
                    this.history.shift();
                }
            }

            draw(ctx) {
                // Draw Trail
                if (this.history.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.history[0].x, this.history[0].y);
                    for (let i = 1; i < this.history.length; i++) {
                        ctx.lineTo(this.history[i].x, this.history[i].y);
                    }
                    ctx.strokeStyle = this.color;
                    ctx.globalAlpha = 0.3;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;
                }

                // Draw Agent (Triangle pointing in direction of velocity)
                let theta = Math.atan2(this.vel.y, this.vel.x) + Math.PI / 2;
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                ctx.rotate(theta);
                ctx.beginPath();
                ctx.moveTo(0, -6);
                ctx.lineTo(-4, 6);
                ctx.lineTo(4, 6);
                ctx.closePath();
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        const agents = [];
        const numScouts = 25;
        const numWorkers = 60;

        for (let i = 0; i < numScouts; i++) {
            agents.push(new Agent(Math.random() * width, Math.random() * height, 'scout'));
        }
        for (let i = 0; i < numWorkers; i++) {
            agents.push(new Agent(Math.random() * width, Math.random() * height, 'worker'));
        }

        // The target the swarm tries to reach
        let targetPos = new Vector(width / 2, height / 2);
        let time = 0;

        function animate() {
            ctx.fillStyle = '#0b0f19';
            ctx.fillRect(0, 0, width, height);

            // Move target in a Lissajous curve to keep it dynamic
            time += 0.01;
            targetPos.x = width / 2 + Math.sin(time * 1.5) * (width * 0.3);
            targetPos.y = height / 2 + Math.cos(time * 1.1) * (height * 0.3);

            // Draw Target
            ctx.fillStyle = 'yellow';
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'yellow';
            ctx.beginPath();
            ctx.arc(targetPos.x, targetPos.y, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; // Reset shadow

            // Update and draw agents
            for (let agent of agents) {
                agent.behaviors(agents, targetPos);
                agent.update();
                agent.draw(ctx);
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
